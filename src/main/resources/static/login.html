<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: radial-gradient(circle at 20% 20%, #f8fafc, #e2e8f0); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-gray-900">
  <div class="w-full max-w-md bg-white/90 backdrop-blur shadow-xl rounded-2xl p-8 space-y-6">
    <div class="space-y-2 text-center">
      <p class="text-sm text-blue-600 font-semibold">心理咨询助手</p>
      <h1 class="text-2xl font-bold">登录后继续</h1>
      <p class="text-sm text-gray-500">使用 user / admin 账号登录</p>
    </div>

    <div class="space-y-4">
      <div class="space-y-2">
        <label class="block text-sm font-medium" for="username">用户名</label>
        <input id="username" type="text" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="user 或 admin" />
      </div>
      <div class="space-y-2">
        <label class="block text-sm font-medium" for="password">密码</label>
        <input id="password" type="password" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入密码" />
      </div>
      <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-semibold">登录</button>
      <p id="status" class="text-sm text-center text-gray-500"></p>
    </div>

    <div class="text-center text-sm text-gray-500">
      <p>登录成功后将自动跳转到原页面</p>
    </div>
  </div>

<script>
  const TOKEN_KEY = 'authToken';
  const ROLE_KEY = 'authRole';

  const loginBtn = document.getElementById('login-btn');
  const statusEl = document.getElementById('status');

  function nextUrl() {
    const params = new URLSearchParams(location.search);
    return params.get('next') || '/index.html';
  }

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!username || !password) {
      statusEl.textContent = '请输入用户名和密码';
      return;
    }
    statusEl.textContent = '登录中...';
    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      if (!res.ok) throw new Error('用户名或密码错误');
      const data = await res.json();
      localStorage.setItem(TOKEN_KEY, data.token);
      localStorage.setItem(ROLE_KEY, data.role);
      statusEl.textContent = '登录成功，正在跳转...';
      setTimeout(() => {
        window.location.href = nextUrl();
      }, 200);
    } catch (e) {
      statusEl.textContent = e.message;
    }
  }

  loginBtn.addEventListener('click', login);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
