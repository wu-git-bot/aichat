<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>管理员登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // 页面加载前校验管理员登录
    (function () {
      const token = localStorage.getItem('authToken');
      const role = localStorage.getItem('authRole');
      if (!token) {
        const next = encodeURIComponent(window.location.pathname + window.location.search);
        window.location.href = `/login.html?next=${next}`;
      } else if (role !== 'ROLE_ADMIN') {
        alert('需要管理员权限，已跳转到登录页');
        localStorage.removeItem('authToken');
        localStorage.removeItem('authRole');
        window.location.href = `/login.html?next=/admin.html`;
      }
    })();
  </script>
</head>
<body class="bg-gray-100 p-10 text-gray-900">
<div class="max-w-xl mx-auto bg-white shadow-lg p-6 rounded-lg">
  <h1 class="text-2xl font-bold mb-4">管理员登录</h1>

  <div class="flex items-center justify-between mb-4 text-sm">
    <span id="status" class="text-gray-600"></span>
    <button id="logout-btn" class="text-red-500 hover:underline">退出登录</button>
  </div>

  <div id="appointments" class="mt-6">
    <h2 class="text-xl font-bold mb-2">预约列表</h2>
    <ul id="appointment-list" class="text-sm space-y-2"></ul>
  </div>
</div>

<script>
  const TOKEN_KEY = 'authToken';
  const ROLE_KEY = 'authRole';

  const statusEl = document.getElementById('status');
  const logoutBtn = document.getElementById('logout-btn');

  function authHeaders() {
    const token = localStorage.getItem(TOKEN_KEY);
    return token ? { 'Authorization': `Bearer ${token}` } : {};
  }

  async function loadAppointments() {
    const res = await fetch('/admin/appointments', { headers: authHeaders() });
    if (!res.ok) {
      statusEl.textContent = '加载预约失败';
      return;
    }

    const data = await res.json();
    const list = document.getElementById('appointment-list');
    list.innerHTML = '';
    data.forEach(app => {
      const li = document.createElement('li');
      li.textContent = `人员 ${app.name} | 邮箱 ${app.email} | 日期 ${app.date} ${app.time} | 情况 ${app.reason}`;
      list.appendChild(li);
    });
  }

  logoutBtn.addEventListener('click', () => {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(ROLE_KEY);
    const next = encodeURIComponent(window.location.pathname + window.location.search);
    window.location.href = `/login.html?next=${next}`;
  });
</script>
</body>
</html>
