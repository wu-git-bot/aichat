spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/aichat?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  web:
    resources:
      cache:
        use-last-modified: false
  ai:
    dashscope:
      agent:
        app-id: ${DASHSCOPE_APP_ID:}
      api-key: ${DASHSCOPE_API_KEY:}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:replace-this-with-at-least-32-characters-secret-key}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:7200}
    users:
      admin:
        username: ${ADMIN_USERNAME:admin}
        password: ${ADMIN_PASSWORD:123456}
      user:
        username: ${USER_USERNAME:user}
        password: ${USER_PASSWORD:123456}

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  port: ${SERVER_PORT:8090}
